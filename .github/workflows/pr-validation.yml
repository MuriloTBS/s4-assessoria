name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - id: typecheck
        name: Type check
        run: npm run typecheck

      - id: lint
        name: Lint
        run: npm run lint

      - id: test
        name: Unit tests
        run: npx vitest run

      - id: build
        name: Build
        run: npm run build
        env:
          VITE_INTERNAL_API_KEY: ci-placeholder
          VITE_SENTRY_DSN: ''

      - name: Comment PR status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const steps = {
              typecheck: '${{ steps.typecheck.outcome }}',
              lint:      '${{ steps.lint.outcome }}',
              test:      '${{ steps.test.outcome }}',
              build:     '${{ steps.build.outcome }}',
            }
            const icon = o => o === 'success' ? '✅' : o === 'skipped' ? '⏭️' : '❌'
            const body = [
              '## Quality Gate',
              '',
              `| Verificação | Status |`,
              `|-------------|--------|`,
              `| TypeScript  | ${icon(steps.typecheck)} ${steps.typecheck} |`,
              `| Lint        | ${icon(steps.lint)} ${steps.lint} |`,
              `| Testes      | ${icon(steps.test)} ${steps.test} |`,
              `| Build       | ${icon(steps.build)} ${steps.build} |`,
            ].join('\n')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            })
